---
- name: Install Docker
  hosts: local
  become: true
  gather_facts: false

  tasks:
    - name: Check if Docker is already installed
      command: docker --version
      register: docker_check
      failed_when: false
      changed_when: false

    - name: Install dependencies
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true
      when: docker_check.rc != 0

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
      when: docker_check.rc != 0

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu noble stable"
        state: present
      when: docker_check.rc != 0

    - name: Install Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true
      when: docker_check.rc != 0

    - name: Add current user to docker group
      user:
        name: "{{ lookup('env', 'USER') }}"
        groups: docker
        append: true
      when: docker_check.rc != 0

    - name: Enable and start docker.service
      systemd:
        name: docker
        enabled: true
        state: started
      when: docker_check.rc != 0

    - name: Verify Docker installation
      command: docker --version
      register: docker_version
      changed_when: false

    - name: Print Docker version
      debug:
        msg: "{{ docker_version.stdout }}"


- name: Deploy http-checker container
  hosts: local
  become: false
  gather_facts: false

  vars:
    project_dir: "{{ playbook_dir }}/../sections2"
    container_name: http_checker

  tasks:
    - name: Build and run container with docker compose
      community.docker.docker_compose_v2:
        project_src: "{{ project_dir }}"
        state: present
        build: always

    - name: Wait for container to finish
      community.docker.docker_container_info:
        name: "{{ container_name }}"
      register: container_info
      until: container_info.container.State.Status != "running"
      retries: 30
      delay: 2

    - name: Check container exit code
      community.docker.docker_container_info:
        name: "{{ container_name }}"
      register: container_final

    - name: Verify script completed successfully
      assert:
        that:
          - container_final.container.State.ExitCode == 0
        fail_msg: "Container exited with error, code: {{ container_final.container.State.ExitCode }}"
        success_msg: "Script completed successfully, exit code: 0"

    - name: Show container logs
      command: docker logs {{ container_name }}
      register: logs
      changed_when: false

    - name: Print logs
      debug:
        msg: "{{ logs.stdout_lines }}"